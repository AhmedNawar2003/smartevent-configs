server:
 port: 8081

spring:
 datasource:
   url: jdbc:postgresql://localhost:5433/users_db
   username: postgres
   password: 1234
 jpa:
   hibernate:
     ddl-auto: update
   show-sql: true

jwt:
 secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
